<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Accueil</title>
        <link rel="icon" type="image/png" id="icon" href="../img/logo1.png">
        <link rel="stylesheet" href="../style.css">
        <link rel="stylesheet" href="accueil.css">
        <script src="../global.js" defer></script>
        <script src="accueil.js" defer></script>
    </head>
    <body>
        <nav>
            <img class="accueil" width="90" src="../img/logo1.png">
            <!--coucouuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuu amirate-->
            <div class="site">
                <button class="accueil btn-accueil">Accueil</button>
                <button class="a_propos">À propos</button>
                <button class="produit">Produits</button>
                <button class="presentation">Équipe</button>
                <button class="contact">Contacts</button>
            </div>

            <div class="horaire">
                <div class="heure">
                    <p id="heure">Heure Paris</p>
                    <div class="clock">
                        <div id="hours-tens"></div>
                        <div id="hours-units"></div>
                        <div id="colon" class="colon">:</div>
                        <div id="minutes-tens"></div>
                        <div id="minutes-units"></div>
                    </div>
                </div>
                <div class="chrono">
                    <p>Vous êtes sur la page depuis : </p>
                    <p id="chrono">00 : 00</p>
                </div>
            </div>
            
        </nav>
        <h1>Accueil</h1>
        
    </body>
</html>
